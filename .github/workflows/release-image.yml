name: Build And Publish Images On Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: vars
        shell: bash
        run: |
          echo "app_image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "judge_image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/orangeoj-judge" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app image metadata
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.app_image }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && !contains(github.ref_name, '-')) || github.event_name == 'workflow_dispatch' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Extract judge image metadata
        id: meta_judge
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.judge_image }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && !contains(github.ref_name, '-')) || github.event_name == 'workflow_dispatch' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push judge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.judge
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_judge.outputs.tags }}
          labels: ${{ steps.meta_judge.outputs.labels }}
          cache-from: type=gha,scope=judge
          cache-to: type=gha,mode=max,scope=judge

      - name: Export image archives
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          APP_IMAGE="${{ steps.vars.outputs.app_image }}:${TAG}"
          JUDGE_IMAGE="${{ steps.vars.outputs.judge_image }}:${TAG}"

          mkdir -p dist
          docker pull "${APP_IMAGE}"
          docker pull "${JUDGE_IMAGE}"

          docker save "${APP_IMAGE}" | gzip -c > "dist/orangeoj-${TAG}-linux-amd64.tar.gz"
          docker save "${JUDGE_IMAGE}" | gzip -c > "dist/orangeoj-judge-${TAG}-linux-amd64.tar.gz"

          (
            cd dist
            sha256sum *.tar.gz > SHA256SUMS.txt
          )

      - name: Publish GitHub Release And Upload Archives
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/orangeoj-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/orangeoj-judge-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/SHA256SUMS.txt
